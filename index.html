<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --bg-card: #111; --border: #252525; --border-hover: #3a3a3a;

  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; }
  #app { max-width: 480px; margin: 0 auto; padding: 0 12px 115px; }
  .header { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 0 10px; z-index: 50; }

  .brand { color: var(--text-dim); letter-spacing: 0.22em; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .iq-stage { margin-left: auto; font-size: 11px; color: var(--text-faint); letter-spacing: 0.05em; text-transform: lowercase; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .stat { background: #161616; border: 1px solid #252525; border-radius: 8px; padding: 8px 10px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 600; color: var(--red); font-family: 'Courier New', monospace; line-height: 1; transition: color 0.4s; }
  .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .progress-bar { height: 2px; background: #1e1e1e; margin-top: 10px; border-radius: 1px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--red); width: 100%; transition: width 0.6s ease; }
  .progress-lbl { font-size: 11px; color: var(--text-faint); margin-top: 4px; font-family: 'Courier New', monospace; text-align: right; letter-spacing: 0.04em; }
  .feed { padding: 14px 0; }
  .news-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; transition: border-color 0.2s; animation: fadeUp 0.3s ease; }
  .news-card:hover { border-color: var(--border-hover); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .news-src { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
  .news-hl { font-size: 14px; font-weight: 500; color: #ffffff; line-height: 1.45; margin-bottom: 10px; }

  .news-tag { font-size: 11px; padding: 3px 7px; border-radius: 4px; background: #1a1a1a; color: var(--text-muted); border: 1px solid #252525; text-transform: uppercase; letter-spacing: 0.05em; }
  .news-time { font-size: 11px; color: var(--text-faint); margin-left: auto; font-family: 'Courier New', monospace; }

  .news-card.lercio { border-left: 2px solid #d4a017; background: #131108; }
  .news-card.lercio .news-hl { color: #fff8e8; }

  .news-card.lercio .news-tag { background: #1e1800; color: #c8920a; border-color: #2e2400; }

  /* ── SISTEMA — settima voce. Monospace, fredda, mai sarcastica. ── */

  .promo-card { background: linear-gradient(135deg, #21180b 0%, #1a1a1a 58%, #17100c 100%); border: 1px dashed #b9822d; border-radius: 10px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; animation: fadeUp 0.3s ease; box-shadow: 0 0 0 1px rgba(185,130,45,.12); }
  .promo-card::before { content: 'SPONSOR WELLNESS / TRAPPOLA DI LUCIDITÀ'; display: block; font-size: 10px; color: #d8bd77; letter-spacing: .16em; font-family: 'Courier New', monospace; margin-bottom: 7px; opacity: .9; }
  .promo-card:hover { border-color: #666; }
  .promo-label { font-size: 10px; color: #c8a045; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 5px; font-family: 'Courier New', monospace; }

  .quiz-card { background: var(--bg-card); border: 1px solid #2a3a2a; border-left: 2px solid #5a8a5a; border-radius: 10px; padding: 14px; margin-bottom: 10px; animation: fadeUp 0.3s ease; }

  .quiz-options { display: flex; flex-direction: column; gap: 6px; }

  .quiz-btn:hover { background: #1e1e1e; border-color: #444; color: #ffffff; }
  .quiz-btn.answered-wrong { border-color: var(--red); background: var(--red-bg); color: #ffffff; cursor: default; }
  .quiz-btn.answered-right { border-color: var(--green); background: var(--green-bg); color: #ffffff; cursor: default; }

  .quiz-feedback { font-size: 11px; color: var(--text-muted); font-family: 'Courier New', monospace; margin-top: 8px; font-style: italic; }
  .load-more { width: 100%; padding: 13px; background: var(--bg-card); border: 1px solid #252525; border-radius: 8px; color: var(--text-muted); font-size: 12px; cursor: pointer; margin-top: 4px; font-family: 'Courier New', monospace; letter-spacing: 0.04em; transition: border-color 0.2s, color 0.2s; }
  .load-more:hover { border-color: var(--red); color: var(--text-dim); }
  .load-more.glitch-1 { animation: glitch1 0.3s; }
  .load-more.glitch-2 { animation: glitch2 0.3s; }
  .load-more.glitch-3 { animation: glitch3 0.3s; color: #ff4040 !important; border-color: var(--red) !important; }
  @keyframes glitch1 { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-1px); } }
  @keyframes glitch2 { 0%,100% { transform: translateX(0); } 25% { transform: translateX(2px); } 75% { transform: translateX(-2px); } }
  @keyframes glitch3 { 0%,100% { transform: translateX(0); text-shadow: none; } 33% { transform: translateX(-3px); text-shadow: 2px 0 var(--red); } 66% { transform: translateX(3px); text-shadow: -2px 0 #4040ff; } }
  .brain-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; animation: fadeIn 0.4s ease; }
  .brain-overlay.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .brain-modal { background: var(--bg); border: 1px solid var(--text-dim); border-radius: 12px; padding: 24px; max-width: 420px; width: 100%; animation: scaleIn 0.3s ease; }
  @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .brain-label { font-size: 10px; color: var(--text-dim); font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .brain-label::before { content: '◉'; color: var(--text-dim); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .brain-msg { font-size: 16px; color: var(--text); font-family: 'Courier New', monospace; line-height: 1.6; margin-bottom: 20px; min-height: 60px; }
  .brain-actions { display: flex; gap: 8px; }
  .brain-btn { flex: 1; padding: 11px; border-radius: 8px; border: 1px solid; background: transparent; cursor: pointer; font-size: 12px; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.2s; }
  .brain-btn.listen { border-color: var(--green); color: var(--green); }
  .brain-btn.listen:hover { background: var(--green-bg); }
  .brain-btn.ignore { border-color: var(--text-faint); color: var(--text-muted); }
  .brain-btn.ignore:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  /* ── Ending overlay base ── */

  .ending-stats { margin: 28px auto 10px; padding: 12px 0; border-top: 1px solid currentColor; border-bottom: 1px solid currentColor; opacity: 0.55; max-width: 300px; font-size: 12px; font-family: 'Courier New', monospace; }

  .ending-restart:hover, .ending-share:hover { opacity: 0.65; }

  /* ── NIRVANA — quasi vuoto, freddo, cinico ── */

  .ending-nirvana .ending-stats { border-color: #222; }
  .ending-nirvana .ending-restart, .ending-nirvana .ending-share { border-color: #333; color: #555; }

  /* ── SMETTI — diagnosi cinica, clinical ── */
  .ending-overlay.ending-smetti { background: #0f0f0f; color: #e0e0e0; flex-direction: column; }
  .ending-smetti .ending-inner { text-align: left; }
  .ending-smetti .e-label { font-size: 10px; font-family: 'Courier New', monospace; letter-spacing: 0.2em; color: #555; margin-bottom: 24px; }
  .ending-smetti .e-title { font-size: 11px; font-family: 'Courier New', monospace; color: #666; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 28px; border-left: 2px solid #333; padding-left: 12px; }
  .ending-smetti .e-step { font-size: 14px; color: #cccccc; line-height: 1.7; margin-bottom: 10px; padding-left: 20px; position: relative; }
  .ending-smetti .e-step::before { content: '—'; position: absolute; left: 0; color: #444; }

  .ending-smetti .e-conclusion { margin-top: 24px; font-size: 13px; font-family: 'Courier New', monospace; color: #444; border-top: 1px solid #222; padding-top: 16px; line-height: 1.8; }
  .ending-smetti .e-conclusion strong { color: #e03535; font-weight: normal; }

  /* ── QUIT — epico, lento, monumentale ── */
  .ending-overlay.ending-quit { background: #050a05; color: #c8f0c8; flex-direction: column; overflow-y: auto; animation: quitPulse 8s ease-in-out infinite; }
  @keyframes quitPulse {
    0%, 100% { background: #050a05; }
    50% { background: #081208; }
  }
  /* Sfondo con erba SVG, sottile, decorativo */
  .ending-quit::before {
    content: '';

    inset: auto 0 0 0;

  .ending-quit .ending-inner { position: relative; z-index: 2; padding: 4vh 0 20px; }

  .ending-quit .e-title {

    margin-left: auto;
    margin-right: auto;
    display: inline-block;
  }
  @keyframes quitTyping {
    from { width: 0; }
    to { width: 15ch; }
  }
  @keyframes quitCursor {
    50% { border-color: transparent; }
  }
  .ending-quit .e-subtitle {
    font-size: 11px;
    color: #4a7a4a;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.18em;
    margin-bottom: 40px;
    text-transform: uppercase;
    opacity: 0;
    animation: quitFadeIn 1.5s ease 3.4s forwards;
  }
  /* Conquiste come iscrizioni monumentali, niente icone */
  .ending-quit .e-monument {
    max-width: 360px;
    margin: 0 auto;
    padding: 0 16px;
  }
  .ending-quit .e-line {
    font-family: 'Courier New', monospace;
    color: #88dd88;
    font-size: 14px;

  }
  .ending-quit .e-line.dim {
    color: #4a7a4a;
    font-size: 12px;
  }
  .ending-quit .e-line:nth-child(1) { animation-delay: 4.5s; }

  @keyframes quitLineIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes quitFadeIn {
    to { opacity: 1; }
  }

function showToast(msg, kind='') {
  const wrap = document.getElementById('toastWrap');
  // Max 2 toast contemporanei: rimuove il più vecchio se necessario
  const existing = wrap.querySelectorAll('.toast');
  if (existing.length >= 2) existing[0].remove();
  const div = document.createElement('div');
  div.className = 'toast ' + kind;
  div.textContent = msg;
  wrap.appendChild(div);
  setTimeout(() => div.remove(), 3600);
}

function clearToasts() {

function pickItem(items, used, fallbackItems=null) {
  // Se il pool principale è vuoto, usa il fallback se disponibile
  if (!items || items.length === 0) {
    const src = fallbackItems && fallbackItems.length ? fallbackItems : null;
    if (!src) return [["Feed esaurito.", "Déjà-vu"], -1];
    const idx = Math.floor(Math.random()*src.length);
    return [src[idx], -1];
  }
  // Pool esaurito: auto-reset invece di fallback fisso.
  // Il feed ricomincia dal pool invece di mostrare sempre le stesse 5 notizie.
  if (used.length >= items.length) {
    used.length = 0; // reset in-place: mantiene il riferimento all'array
  }
  let idx;
  let guard = 0;
  do { idx = Math.floor(Math.random()*items.length); guard++; } while (used.includes(idx) && guard < 500);
  used.push(idx);
  return [items[idx], idx];
}
function timeStr(s) { return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'); }

function unlockFinal(name) {

}
function updateFinalsPill() {

  }
}

// ── A2 NIRVANA — degrado titoli in base al QI ─────────────────────────────
function degradeTitle(hl, q) {
  const words = String(hl).split(' ').filter(Boolean);
  if (q >= 50) return hl;
  if (q >= 30) return words.slice(0, 7).join(' ') + (words.length > 7 ? '…' : '');
  if (q >= 15) return words.slice(0, 3).join(' ') + '…';
  if (q >= 5)  return words.slice(0, 2).join(' ');
  // QI < 5: una parola a caso tra le prime 5 — il cervello non processa più sequenze
  return words[Math.floor(Math.random() * Math.min(words.length, 5))] || '…';
}

function nirvanaClass(q) {
  if (q >= 50) return '';
  if (q >= 30) return 'nirvana-1';
  if (q >= 15) return 'nirvana-2';
  if (q >= 5)  return 'nirvana-3';
  return 'nirvana-4';
}

}

let purchaseGateStep = 0;

function gateRequirement(nextBuy) {
  if (nextBuy === 3) return 1;
  if (nextBuy === 4) return 2;
  if (nextBuy >= 5) return 4;
  return 0;
}

function promoGateMessage(purchaseNumber, step, required) {
  const scripts = {
    3: ['Terzo acquisto wellness. Hint gratuito: forse ascoltare il cervello costa meno del carrello.'],
    4: ['Quarto acquisto. Primo controllo qualità: stai comprando un limite invece di metterlo.', 'Secondo controllo qualità: il cervello offre lo stesso servizio, ma senza fattura.'],
    5: ['Quinto acquisto. Il reparto casse spirituali ti saluta per nome.', 'Respirare resta gratis. Questa informazione non piace agli investitori.', 'Stai per trasformare il problema in abbonamento. È una scelta, tecnicamente.', 'Ultimo click: compri la pace o provi, per scandalo, ad ascoltarti?']
  };
  return (scripts[purchaseNumber] && scripts[purchaseNumber][step-1]) || `Conferma ${step}/${required}: frizione aggiunta per il tuo bene, forse.`;
}

function completePromoPurchase() {
  if (!pendingPromo || !pendingPromoElement || gameOver) return;

  const div = pendingPromoElement;
  closeProductPage();
  div.classList.add('used');

  // SISTEMA registra il primo acquisto
  if (adClicks === 1) addSistemaCard();
  // Metamorfosi capitalismo progressiva
  if (adClicks >= 3) applyCapitalismoMorph(Math.min(adClicks - 1, 4));
  if (!gameOver && adClicks >= 5 && iq >= 35) {
    setTimeout(() => triggerEnding('capitalismo'), 650);
  } else if (!gameOver && adClicks >= 5 && iq < 35) {
    showToast('Troppo tardi per il capitalismo spirituale. Sei già quasi folklore.', 'bad');

function buyCurrentPromo() {
  if (!pendingPromo || !pendingPromoElement || gameOver) return;
  const nextBuy = adClicks + 1;
  const required = gateRequirement(nextBuy);
  if (purchaseGateStep < required) {
    purchaseGateStep++;
    const gate = document.getElementById('shopGate');
    const btn = document.getElementById('shopBuyBtn');
    if (gate) {
      gate.classList.add('active');
      gate.textContent = promoGateMessage(nextBuy, purchaseGateStep, required);
    }
    if (btn) {
      btn.classList.add('armed');
      btn.textContent = purchaseGateStep >= required ? 'ok, compra davvero' : `conferma ${purchaseGateStep + 1}/${required}`;
    }
    showToast(`Frizione anti-shopping ${purchaseGateStep}/${required}. Il cervello applaude piano.`, purchaseGateStep >= required ? 'bad' : 'good');
    return;
  }
  completePromoPurchase();
}

function normalizeQuiz(q) {
  if (q && Array.isArray(q.opts)) return q;
  // Backward compatibility: some older 2-choice polls still exist in the pool.
  // Convert them into the new 4-choice format so one legacy item cannot crash the preview.
  if (q && typeof q.right === 'string' && typeof q.wrong === 'string') {
    return {
      q: q.q || 'Sondaggio non caricato correttamente. Cosa fai?',
      opts: [
        {t: q.right, d: 2, k: 'conscious', fb: q.fb || 'risposta consapevole'},
        {t: 'Non saprei, ma almeno ci penso', d: 0, k: 'neutral', fb: 'neutralità dignitosa'},
        {t: q.wrong, d: -1, k: 'stupid', fb: q.fb || 'scelta discutibile'},
        {t: 'Apro altre 14 notizie per decidere', d: -3, k: 'idiot', fb: 'hai trasformato il dubbio in carburante'}
      ]
    };
  }
  // Last-resort fallback: keep the game alive instead of killing the feed.
  return {
    q: 'Il feed ha perso il sondaggio. Reazione?',
    opts: [
      {t:'Chiudo e salvo la sanità mentale', d:2, k:'conscious', fb:'hai scelto la via improbabile'},
      {t:'Segnalo il bug mentalmente', d:0, k:'neutral', fb:'ticket non aperto'},
      {t:'Continuo come se nulla fosse', d:-1, k:'stupid', fb:'resilienza o negazione'},
      {t:'Clicco tutto più forte', d:-3, k:'idiot', fb:'debugging da primate'}
    ]
  };
}

function addQuizCard() {
  const [rawQuiz] = pickItem(QUIZZES, quizUsed);
  const q = normalizeQuiz(rawQuiz);
  const div = document.createElement('div');
  div.className = 'quiz-card';

  const opts = [...q.opts].sort(() => Math.random() - 0.5);
  const buttons = opts.map(opt =>
    `<button class="quiz-btn" data-delta="${opt.d}" data-kind="${opt.k}" data-fb="${escapeHtml(opt.fb)}">${escapeHtml(opt.t)}</button>`
  ).join('');

  div.innerHTML = `<div class="quiz-label">▷ Sondaggio onesto / 4 scelte</div><div class="quiz-q">${escapeHtml(q.q)}</div><div class="quiz-options">${buttons}</div><div class="quiz-feedback" style="display:none;"></div>`;
  feed.appendChild(div);

  const btns = div.querySelectorAll('.quiz-btn');
  const fb = div.querySelector('.quiz-feedback');
  btns.forEach(btn => {
    btn.onclick = () => {
      const delta = Number(btn.getAttribute('data-delta'));
      const kind = btn.getAttribute('data-kind');
      const text = btn.getAttribute('data-fb');

      btns.forEach(b => { b.disabled = true; });

      if (kind === 'conscious') btn.classList.add('answered-right');
      else if (kind === 'neutral') btn.classList.add('answered-neutral');
      else if (kind === 'idiot') btn.classList.add('answered-idiot');
      else btn.classList.add('answered-wrong');

      // traccia via del santo: solo conscious conta
      if (kind !== 'conscious') allQuizConscious = false;
      quizAnsweredCount++;

      const sign = delta > 0 ? '+' : '';
      fb.textContent = `// ${text} — ${sign}${delta} QI`;
      fb.style.display = 'block';

      if (delta !== 0) {
        const reason = kind === 'conscious' ? 'risposta consapevole, raro evento naturale'
          : kind === 'idiot' ? 'risposta idiota, punizione educativa'
          : 'risposta stupida, micro-danno registrato';
        updateIQ(delta, reason);
      } else {
        showToast('0 QI — risposta neutra: non hai peggiorato, non festeggiare', '');
      }
    };
  });
  cardsSinceInterruption = 0;
}

function addLoadMore() {
  const btn = document.createElement('button');
  btn.className = 'load-more';

function setBrainrotButton(btn) {
  const n = recentLoadClicks.length;
  let level = 0;

  // Testo che degenera su due assi:
  // - totalLoadMore: quante volte hai caricato in totale (stanchezza)
  // - recentLoadClicks: quanto velocemente stai cliccando (brainrot acuto)
  // Le due scale si sommano — chi clicca in fretta degrada più in fretta.

  // Asse brainrot acuto (click ravvicinati)
  if (n >= 25) level = 4;
  else if (n >= 20) level = 3;
  else if (n >= 15) level = 2;
  else if (n >= 10) level = 1;

  // Asse stanchezza cronica (totalLoadMore) — si accumula più lentamente
  let chronLevel = 0;
  if (totalLoadMore >= 20) chronLevel = 4;
  else if (totalLoadMore >= 14) chronLevel = 3;
  else if (totalLoadMore >= 9) chronLevel = 2;
  else if (totalLoadMore >= 5) chronLevel = 1;

  const effectiveLevel = Math.max(level, chronLevel);
  brainrotLevel = Math.max(brainrotLevel, level);

  // Scala del testo: da verboso e ironico a silenzio totale
  const labels = [
    '↓ carica altro (sì, davvero)',   // 0 — inizio, tono sarcastico
    '↓ un altro po\'',                // 1 — ancora ragionevole
    '↓ ancora',                       // 2 — si semplifica
    '↓ dai',                          // 3 — richiesta
    '↓ pls',                          // 4 — supplica
  ];

  // Livello 4 massimo: testo sparisce, rimane solo la freccia
  const label = effectiveLevel >= 4 ? '↓' : labels[Math.min(effectiveLevel, labels.length - 1)];

  btn.textContent = label;
  btn.className = 'load-more' + (effectiveLevel ? ' glitch-' + Math.min(effectiveLevel, 3) : '');

  // Hint fase discovery: dopo 3 click veloci ma prima che degeneri davvero
  const n2 = recentLoadClicks.length;
  if (n2 >= 3 && n2 < 12 && effectiveLevel < 2) {
    btn.dataset.hint = 'più veloce succede qualcosa →';
  } else if (n2 >= 12 && effectiveLevel < 3) {
    btn.dataset.hint = 'qualcosa sta succedendo.';
  } else {
    delete btn.dataset.hint;
  }
}

function onLoadMore(btn, event) {
  if (gameOver) return;
  const now = Date.now();
  const fastAgain = lastLoadClickAt && (now - lastLoadClickAt < 650);
  lastLoadClickAt = now;
  if (fastAgain || (event && event.detail >= 2)) {
    doubleClickStreak++;
    brainrotLevel = Math.max(brainrotLevel, Math.min(4, doubleClickStreak));
    showToast('doppio impulso registrato: stabilità semantica in calo', 'bad');
  } else {
    doubleClickStreak = Math.max(0, doubleClickStreak - 1);
  }
  recentLoadClicks.push(now);
  recentLoadClicks = recentLoadClicks.filter(t => now - t < 60000);
  setBrainrotButton(btn);
  if ((recentLoadClicks.length >= 24 && brainrotLevel >= 3) || doubleClickStreak >= 4) { triggerEnding('brainrot'); return; }
  totalLoadMore++;
  loadsSinceAd++;
  spendScrollIQ();
  if (gameOver) return;
  // SISTEMA: prima comparsa al 2° load, poi ogni 4° load
  if (totalLoadMore === 2 && sistemaCount === 0) addSistemaCard();
  else if (totalLoadMore > 2 && totalLoadMore % 4 === 0) addSistemaCard();
  btn.remove();

  try {
    const newsToAdd = 6 + Math.floor(Math.random()*2);
    const mustShowAd = adsShown < 4 || loadsSinceAd >= 2;
    const mustShowQuiz = totalLoadMore <= 3 || (totalLoadMore % 2 === 0);
    // Lercio: più spesso man mano che il QI cala.
    // Sopra 60 è raro (ogni 5 load), sotto 40 è frequente (ogni 2), sotto 20 quasi garantito.
    // Narrativamente: il cervello che degrada smette di distinguere satira da realtà.
    let lercioFreq;
    if (iq >= 60) lercioFreq = 5;
    else if (iq >= 40) lercioFreq = 3;
    else if (iq >= 20) lercioFreq = 2;
    else lercioFreq = 1;
    const showLercio = LERCIO_NEWS.length > 0 && totalLoadMore % lercioFreq === 0;
    const lercioAt = showLercio ? 1 + Math.floor(Math.random()*4) : -1;
    for (let i = 0; i < newsToAdd; i++) {
      if (i === lercioAt) {
        addLercioCard();
      } else {
        addNewsCard(brainrotLevel >= 3 && i === newsToAdd-1);
      }
      if (i === 1 && mustShowQuiz) addQuizCard();
      if (i === 3 && mustShowAd) addAdCard();
    }
  } catch (err) {
    console.error('Errore generazione feed:', err);
    showToast('Il feed ha tossito. Ho salvato il bottone prima che sparisse.', 'bad');
  } finally {
    if (!gameOver) {
      addLoadMore();
      const btns = feed.querySelectorAll('.load-more');
      if (btns.length) setBrainrotButton(btns[btns.length-1]);
    }
  }
}

    if (seconds >= 480) {

      ];

    }

function listenBrain() {
  document.getElementById('brainOverlay').classList.remove('active');
  if (isFirstBrainShown) { brainListenedFirst = true; isFirstBrainShown = false; }
  brainListened++;
  brainListenedStreak++;
  showToast(`cervello ascoltato: ${Math.min(brainListenedStreak,3)}/3`, 'good');
  if (brainListenedStreak >= 3) {
    // Opzione D: quit = si era "scivolato" (cervello ignorato almeno 1x, o acquistato qualcosa)
    // smetti = via pulita senza mai cedere
    if (everIgnored || adClicks >= 1) triggerEnding('quit');
    else triggerEnding('smetti');
    return;
  }
  scheduleNextBrain('listen');
}

function ignoreBrain() {
  document.getElementById('brainOverlay').classList.remove('active');
  if (isFirstBrainShown) { isFirstBrainShown = false; }
  brainIgnored++;
  everIgnored = true;
  brainListenedStreak = 0;
  updateIQ(-4, 'il cervello prende nota del tradimento');
  addQuitWhisper();
  // SISTEMA nota le ignoranze ripetute
  if (brainIgnored === 2) addSistemaCard();
  scheduleNextBrain('ignore');
}

function scheduleNextBrain(mode='neutral') {
  // Circa 40% più frequente rispetto alla v2.5.
  // Se lo ignori resta più raro del percorso buono, ma diventa anche più cattivo.
  let delay;
  if (mode === 'listen') delay = Math.min(27000, 13000 + brainListened * 3600);
  else if (mode === 'ignore') delay = Math.min(108000, 51000 + brainIgnored * 18000);
  else delay = 15000;
  if (brainTimerId) clearTimeout(brainTimerId);
  brainTimerId = setTimeout(() => { if (!gameOver) showBrainPopup(); }, delay);
}

function checkEndings() {
  if (gameOver) return;
  if (iq <= 0) triggerEnding('nirvana');
}

// Testo di condivisione su misura per il finale raggiunto.

function buildShareText(type) {
  const t = timeStr(seconds);
  const teasers = {
    nirvana: `QI: 0/100. non è pace, è assenza. la differenza non si sente da dentro. in ${t}. Provalo:`,
    smetti: `ho chiuso l'app. ho annaffiato la pianta. ho ripreso il telefono. punto a capo. (${t}) Provalo:`,

    capitalismo: `ho risolto il doomscrolling comprando 5 prodotti per smettere il doomscrolling. la pace ha un piano annuale. Provalo:`,
    brainrot: `BRAINROT™ in ${t}. sigma. no cap. ratio. il feed ha vinto. fr fr. Provalo:`
  };
  const line = teasers[type] || `DOOM/SCROLL — un feed che vuole il tuo QI. Provalo:`;

}

async function shareEnding(type, btn) {
  const text = buildShareText(type);
  // Web Share API funziona bene su mobile (apre il foglio di condivisione nativo).
  if (navigator.share) {
    try {
      await navigator.share({ title: 'DOOM/SCROLL', text });
      return;
    } catch (err) {
      // L'utente ha annullato. Su molti browser è AbortError: niente fallback, è una scelta consapevole.
      if (err && err.name === 'AbortError') return;
    }
  }
  // Fallback per desktop e browser senza Web Share: copia negli appunti.
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = 'copiato negli appunti';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'condividi'; btn.classList.remove('copied'); }, 2400);
  } catch {
    // Browser molto vecchi: ultimo fallback con textarea.
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); btn.textContent = 'copiato'; btn.classList.add('copied'); }
    catch { btn.textContent = 'copia non supportata'; }
    document.body.removeChild(ta);
    setTimeout(() => { btn.textContent = 'condividi'; btn.classList.remove('copied'); }, 2400);
  }
}

function triggerEnding(type) {
  if (gameOver) return;
  gameOver = true;
  clearToasts();
  document.getElementById('brainOverlay').classList.remove('active');
  // Nasconde subito il feed — evita il flash tra prefinal e schermata finale
  document.getElementById('app').style.visibility = 'hidden';

  if (type === 'smetti' && allQuizConscious && noAdsBought && brainListenedFirst && noLercioInteracted && quizAnsweredCount >= 1) {
    type = 'santo';
  }
  showPreFinalThenEnding(type);
}

function playZenSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [261.63, 329.63, 392.00].forEach((freq, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.frequency.value = freq;
      o.type = 'sine';
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0, ctx.currentTime + i*0.3);
      g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i*0.3 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.3 + 3);
      o.start(ctx.currentTime + i*0.3);
      o.stop(ctx.currentTime + i*0.3 + 3);
    });
  } catch(e) {}
}
function playGlitchSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < 8; i++) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.frequency.value = 80 + Math.random()*400;
      o.type = 'square';
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.08, ctx.currentTime + i*0.08);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime + i*0.08 + 0.05);
      o.start(ctx.currentTime + i*0.08);
      o.stop(ctx.currentTime + i*0.08 + 0.05);
    }
  } catch(e) {}
}

// ── AMBIENT AUDIO ────────────────────────────────────────────────────────────
function initAmbient() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    ambientGainNode = audioCtx.createGain();
    ambientGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    ambientGainNode.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 4);
    ambientGainNode.connect(audioCtx.destination);
    // Bass drone
    const bass = audioCtx.createOscillator();
    bass.type = 'sine';
    bass.frequency.setValueAtTime(38, audioCtx.currentTime);
    const bassGain = audioCtx.createGain();
    bassGain.gain.value = 0.7;
    bass.connect(bassGain);
    bassGain.connect(ambientGainNode);
    bass.start();
    ambientOscillators.push(bass);
    // Sub hum
    const hum = audioCtx.createOscillator();
    hum.type = 'triangle';
    hum.frequency.setValueAtTime(60, audioCtx.currentTime);
    const humGain = audioCtx.createGain();
    humGain.gain.value = 0.3;
    hum.connect(humGain);
    humGain.connect(ambientGainNode);
    hum.start();
    ambientOscillators.push(hum);
    // Digital noise via buffer
    const bufferSize = audioCtx.sampleRate * 2;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.15;
    const noiseSource = audioCtx.createBufferSource();
    noiseSource.buffer = noiseBuffer;
    noiseSource.loop = true;
    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.value = 800;
    noiseFilter.Q.value = 0.5;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.value = 0.18;
    noiseSource.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(ambientGainNode);
    noiseSource.start();
    ambientNoise = { source: noiseSource, filter: noiseFilter, gain: noiseGain };
    ambientStarted = true;
  } catch(e) {}
}

function updateAmbient(currentIQ) {
  if (!ambientStarted || !audioCtx || !ambientGainNode) return;
  try {
    const t = audioCtx.currentTime;
    if (currentIQ >= 60) {
      ambientGainNode.gain.linearRampToValueAtTime(0.06, t + 2);
      if (ambientOscillators[0]) ambientOscillators[0].frequency.linearRampToValueAtTime(38, t + 3);
    } else if (currentIQ >= 40) {
      ambientGainNode.gain.linearRampToValueAtTime(0.10, t + 2);
      if (ambientOscillators[0]) ambientOscillators[0].frequency.linearRampToValueAtTime(32, t + 3);
      if (ambientNoise) ambientNoise.gain.gain.linearRampToValueAtTime(0.28, t + 2);
    } else if (currentIQ >= 20) {
      ambientGainNode.gain.linearRampToValueAtTime(0.16, t + 2);
      if (ambientOscillators[0]) ambientOscillators[0].frequency.linearRampToValueAtTime(26, t + 3);
      if (ambientNoise) { ambientNoise.filter.frequency.linearRampToValueAtTime(400, t + 2); ambientNoise.gain.gain.linearRampToValueAtTime(0.38, t + 2); }
    } else {
      ambientGainNode.gain.linearRampToValueAtTime(0.22, t + 2);
      if (ambientOscillators[0]) ambientOscillators[0].frequency.linearRampToValueAtTime(18, t + 3);
      if (ambientNoise) { ambientNoise.filter.frequency.linearRampToValueAtTime(200, t + 2); ambientNoise.gain.gain.linearRampToValueAtTime(0.5, t + 2); }
    }
  } catch(e) {}
}

function stopAmbient() {
  try {
    if (ambientGainNode && audioCtx) ambientGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
  } catch(e) {}
  ambientStarted = false;
}

// ── PRESSIONE CRESCENTE ───────────────────────────────────────────────────────
function checkPressure(s) {
  if (pressureLevel < 1 && s >= 180) {
    pressureLevel = 1;
    showToast('3 minuti. il feed non si preoccupa per te.', 'bad');
    if (brainTimerId) { clearTimeout(brainTimerId); brainTimerId = setTimeout(() => { if (!gameOver) showBrainPopup(); }, 4000); }
  }
  if (pressureLevel < 2 && s >= 300) {
    pressureLevel = 2;
    applyFeedDegradation();
    showToast('5 minuti. il feed sta cambiando.', 'bad');
  }
  if (pressureLevel < 3 && s >= 480) {
    pressureLevel = 3;
    if (!eventAt8minDone) { eventAt8minDone = true; triggerUniqueEvent(); }
  }
}

function applyFeedDegradation() {
  document.querySelectorAll('.news-card:not(.brainrot-news)').forEach((card, i) => {
    if (i % 3 === 0) card.style.opacity = '0.85';
    if (i % 5 === 0) card.style.filter = 'saturate(0.7)';
  });
}

function triggerUniqueEvent() {

  updateIQ(-5, 'messaggio ignorato. lei aspetta ancora.');
  showToast('il feed riprende. il messaggio no.', 'bad');
  resumeAfterNotif();
  brainrotLevel = Math.max(brainrotLevel, 1);
  if (brainTimerId) clearTimeout(brainTimerId);
  brainTimerId = setTimeout(() => { if (!gameOver) showBrainPopup(); }, 3000);
}

function replyNotification() {
  document.getElementById('notifOverlay').classList.remove('active');
  notificationReplied = true;
  convStep = 0;
  document.getElementById('convOverlay').classList.add('active');
  const msgs = document.getElementById('convMessages');
  msgs.innerHTML = '';
  addConvMsg('Ti ho cercato. Stai bene?', 'them');
  showConvChoices(0);
}

const CONV_SCRIPT = [
  {
    choices: [
      { text: 'Sì, sto bene. Perché?', next: 1 },
      { text: 'Non lo so, onestamente.', next: 2 }
    ]
  },
  {
    them: 'Niente, avevo un brutto presentimento. Possiamo vederci?',
    choices: [
      { text: 'Sì. Adesso metto giù il telefono.', next: 'good' },
      { text: 'Oggi non riesco.', next: 3 }
    ]
  },
  {
    them: 'Ok. Ti ascolto.',
    choices: [
      { text: 'Grazie. Ci vediamo?', next: 'good' },
      { text: 'Lascia stare, va bene così.', next: 3 }
    ]
  },
  {
    them: 'Ok. Scrivimi quando vuoi.',
    choices: null,
    end: 'hai chiuso la conversazione. lei aspetta ancora.'
  }
];

function addConvMsg(text, side) {
  const msgs = document.getElementById('convMessages');
  const div = document.createElement('div');
  div.className = 'conv-msg ' + side;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showConvChoices(stepIdx) {
  const step = CONV_SCRIPT[stepIdx];
  const choicesEl = document.getElementById('convChoices');
  choicesEl.innerHTML = '';
  if (!step.choices) {
    const end = document.createElement('div');
    end.className = 'conv-end-msg';
    end.textContent = step.end || '';
    choicesEl.appendChild(end);
    setTimeout(() => {
      document.getElementById('convOverlay').classList.remove('active');
      resumeAfterNotif();
    }, 2500);
    return;
  }
  step.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'conv-choice';
    btn.textContent = choice.text;
    btn.onclick = () => advanceConv(choice, stepIdx);
    choicesEl.appendChild(btn);
  });
}

function advanceConv(choice, fromStep) {
  addConvMsg(choice.text, 'me');
  document.getElementById('convChoices').innerHTML = '';
  if (choice.next === 'good') {
    setTimeout(() => {
      document.getElementById('convOverlay').classList.remove('active');
      triggerEnding('quit');
    }, 800);
    return;
  }
  const nextStep = CONV_SCRIPT[choice.next];
  setTimeout(() => {
    if (nextStep.them) addConvMsg(nextStep.them, 'them');
    setTimeout(() => showConvChoices(choice.next), 500);
  }, 700);
}

function resumeAfterNotif() {
  mainTimerId = setInterval(() => {
    if (gameOver) return;
    seconds++;
    document.getElementById('timerVal').textContent = timeStr(seconds);
    if (seconds % 16 === 0) {
      const reason = PASSIVE_REASONS[passiveReasonIdx % PASSIVE_REASONS.length];
      passiveReasonIdx++;
      updateIQ(-1, reason);
    }
    checkPressure(seconds);
    updateAmbient(iq);
    document.getElementById('liveDot').style.opacity = seconds % 2 === 0 ? '1' : '0.3';
  }, 1000);
}
// ── CAPITALISMO MORPH ─────────────────────────────────────────────────────────
function applyCapitalismoMorph(level) {
  capitalismoMorphLevel = level;
  document.body.classList.remove('morph-1','morph-2','morph-3','morph-4');
  if (level > 0) document.body.classList.add('morph-' + Math.min(level, 4));
  if (level >= 2) {
    const w = document.createElement('div');
    w.className = 'wellness-inject';
    w.textContent = 'hai acquistato ' + level + ' prodotti per il tuo benessere. il feed registra il tuo percorso verso la lucidità. prossimo passo: piano annuale.';
    const loadBtn = feed.querySelector('.load-more');
    if (loadBtn) feed.insertBefore(w, loadBtn);
  }
}

// ── PRE-FINALE LINE ───────────────────────────────────────────────────────────
function generatePreEndingLine() {
  const mins = Math.floor(seconds / 60);
  const timeDesc = mins > 0 ? `${mins} minut${mins === 1 ? 'o' : 'i'}` : `${seconds} secondi`;
  const parts = [];
  if (adClicks > 0) parts.push(`hai comprato ${adClicks === 1 ? 'una volta' : `${adClicks} volte`}.`);
  if (brainIgnored > 0) parts.push(`hai ignorato il cervello ${brainIgnored === 1 ? 'una volta' : `${brainIgnored} volte`}.`);
  if (brainListened > 0) parts.push(`hai ascoltato il cervello ${brainListened === 1 ? 'una volta' : `${brainListened} volte`}.`);
  parts.push(`hai scrollato per ${timeDesc}.`);
  if (notificationIgnored) parts.push('non hai risposto al messaggio.');
  else if (notificationReplied) parts.push('hai risposto al messaggio.');
  if (newsCount > 30) parts.push(`hai visto ${newsCount} cose.`);
  return parts.join(' ');
}

function showPreFinalThenEnding(type) {
  const line = generatePreEndingLine();
  const overlay = document.getElementById('prefinalOverlay');

  // Forza il restart dell'animazione: sostituisce il contenitore con un clone pulito.
  // Senza questo, se il gioco viene rigiocato la seconda volta l'animazione non riparte.
  const oldText = document.getElementById('prefinalText');
  const newText = oldText.cloneNode(false);
  newText.id = 'prefinalText';

  // Dividi il testo in frasi — max 3 righe, ognuna appare con delay scaglionato
  const sentences = line.split('. ').filter(s => s.trim()).slice(0, 3);
  newText.innerHTML = sentences.map(s => `<span>${s.endsWith('.') ? s : s + '.'}</span>`).join('');
  oldText.parentNode.replaceChild(newText, oldText);

  overlay.classList.add('active');

  // 3.8s: abbastanza da leggere 3 frasi, con l'animazione che finisce naturalmente
  setTimeout(() => {
    overlay.classList.remove('active');
    doTriggerEnding(type);
  }, 3800);
}

function init() {
  updateFinalsPill();
  initSistemaId();
  // Timer idle: se l'utente non clicca load-more per 90s, SISTEMA appare lo stesso
  setTimeout(() => {
    if (!gameOver && sistemaCount === 0) addSistemaCard();
  }, 90000);
  // Sessione 2: riconosce il ritorno
  if (isReturningPlayer) {
    const sub = document.getElementById('appSubtitle');
    if (sub) sub.innerHTML = 'rieccoci. il feed ti aspettava. <span class="pill" id="finalsPill"></span>';
    updateFinalsPill();
    // Prima card che sa che sei tornato
    const returnCard = document.createElement('div');
    returnCard.className = 'news-card peak';
    returnCard.innerHTML = `<div class="news-src">IL FEED — MEMORIA PERSISTENTE</div><div class="news-hl">utente noto: sessione precedente rilevata. benvenuto di nuovo in quello che non riesci a smettere di fare.</div><div class="news-meta"><span class="news-tag">Ritorno</span><span class="news-time">adesso</span></div>`;
    feed.appendChild(returnCard);
    newsCount++;
    document.getElementById('newsCount').textContent = newsCount;
    // cervello scrive subito
    if (brainTimerId) clearTimeout(brainTimerId);
    brainTimerId = setTimeout(() => { if (!gameOver) showBrainPopup(); }, 4000);
  }
  addNewsCard();
  addAdCard();
  for (let i = 0; i < 3; i++) addNewsCard();
  addQuizCard();
  addNewsCard();
  addLoadMore();
  if (!isReturningPlayer) scheduleNextBrain('neutral');
  scheduleNotification();
  mainTimerId = setInterval(() => {
    if (gameOver) return;
    seconds++;
    document.getElementById('timerVal').textContent = timeStr(seconds);
    if (seconds % 16 === 0) {
      const reason = PASSIVE_REASONS[passiveReasonIdx % PASSIVE_REASONS.length];
      passiveReasonIdx++;
      updateIQ(-1, reason);
    }
    checkPressure(seconds);
    updateAmbient(iq);
    document.getElementById('liveDot').style.opacity = seconds % 2 === 0 ? '1' : '0.3';
  }, 1000);
}

// Tasto Esc chiude le modal aperte (igiene UX): cervello e shop.
// Non chiude la schermata di finale, che è intenzionalmente bloccante.
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  const shop = document.getElementById('shopOverlay');
  if (shop && shop.classList.contains('active')) { closeProductPage(); return; }
  const brain = document.getElementById('brainOverlay');
  if (brain && brain.classList.contains('active')) {
    // Chiudere il cervello con Esc = ignorarlo. Coerente con la satira.
    ignoreBrain();
  }
});

// Carica contenuto e quiz in parallelo, poi avvia il gioco.
// Fallback su dati minimi se il fetch fallisce (es. file:// senza server).

  NEWS_INTERESTING       = c.news_interesting       || [];

  EXTRA_MEH_ENDINGS      = c.extra_meh_endings      || [];
  EXTRA_INTERESTING      = c.extra_interesting      || [];
  EXTRA_PEAK             = c.extra_peak             || [];
  EXTRA_BRAINROT         = c.extra_brainrot         || [];
  EXTRA_NEWS_MEH_V28     = c.extra_news_meh_v28     || [];
  EXTRA_NEWS_INTERESTING_V28 = c.extra_news_interesting_v28 || [];

  EXTRA_NEWS_BRAINROT_V28= c.extra_news_brainrot_v28|| [];

Promise.allSettled([
  fetch('content.json').then(r => r.json()),
  fetch('quizzes.json').then(r => r.json()),
  fetch('lercio.json').then(r => r.json())
]).then(([contentRes, quizzesRes, lercioRes]) => {

});
